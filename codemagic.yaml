workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - code-signing
      vars:
        BUNDLE_ID: com.jcode.mobile
        SCHEME: JCodeMobile
        TEAM_ID: TAS6ARKDN7
      xcode: 26.2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    when:
      changeset:
        includes:
          - 'ios/**'
          - 'codemagic.yaml'
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd ios
          xcodegen generate
          echo "=== Generated Info.plist ==="
          cat Sources/JCodeMobile/Info.plist
          echo "=== End Info.plist ==="
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles --project ios/JCodeMobile.xcodeproj
      - name: Set build number
        script: |
          echo "Build number: $PROJECT_BUILD_NUMBER"
      - name: Build ipa for distribution
        script: |
          cd ios
          xcode-project build-ipa \
            --project "JCodeMobile.xcodeproj" \
            --scheme "$SCHEME" \
            --config Release \
            --archive-xcargs "CURRENT_PROJECT_VERSION=$PROJECT_BUILD_NUMBER"
    artifacts:
      - ios/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
        beta_groups:
          - "Internal Testers"
