<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jcode mobile – Add Server</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page sheet-scene">
  <div class="phone">
    <div class="canvas">
      <div class="dimmed-settings">
        <div class="statusbar"><div>9:41</div><div class="right mono">5G 100%</div></div>
        <div class="topbar" style="justify-content:center;"><div class="nav-title">Settings</div></div>
      </div>
      <div class="sheet-overlay"></div>
      <div class="bottom-sheet" style="min-height: 580px;">
        <div class="grabber"></div>
        <div class="sheet-header">
          <div class="sheet-title">Add Server</div>
          <div style="color:var(--text-2); font-size:14px;">Cancel</div>
        </div>
        <div style="color:var(--text-2); text-align:center; line-height:1.5; margin:0 12px 18px;">Run <span class="mono">jcode pair</span> on your machine<br>to get a pairing code.</div>
        <div class="sheet-scroll">
          <div class="field"><div class="label">Host</div><div class="input">my-macbook.tail1234.ts.net</div></div>
          <div class="field"><div class="label">Port</div><div class="input mono">7643</div></div>
          <div class="field"><div class="label">Pair Code</div><div class="input mono">842391</div></div>
          <div style="display:flex; gap:8px; color:var(--danger); font-size:12px; align-items:flex-start;">⚠<div>Server unreachable. Confirm host, port, and gateway status.</div></div>
          <div class="btn-primary" style="margin-top: 4px;">Pair &amp; Connect</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
