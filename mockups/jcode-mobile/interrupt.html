<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jcode mobile – Interrupt</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page sheet-scene">
  <div class="phone">
    <div class="canvas">
      <div class="dimmed-chat">
        <div class="statusbar"><div>9:41</div><div class="right mono">5G 100%</div></div>
        <div class="topbar"><div class="server-meta"><div class="dot"></div><div><div class="server-name">jcode</div><div class="server-sub mono">v0.4.1 · connected</div></div></div><div class="badge accent mono">gpt-5</div></div>
      </div>
      <div class="sheet-overlay"></div>
      <div class="bottom-sheet" style="min-height: 330px;">
        <div class="grabber"></div>
        <div class="sheet-header">
          <div class="sheet-title">Interrupt Agent</div>
          <div style="display:flex; gap:18px; align-items:center;">
            <div style="color:var(--text-2); font-size:14px;">Cancel</div>
            <div style="color:var(--accent); font-size:14px; font-weight:700;">Send</div>
          </div>
        </div>
        <div class="textarea">Prioritize the mobile handoff first, then post a concise summary of the build and reload state.</div>
      </div>
    </div>
  </div>
</body>
</html>
