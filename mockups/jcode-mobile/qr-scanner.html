<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jcode mobile – QR Scanner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page">
  <div class="phone qr-scene">
    <div class="canvas">
      <div class="statusbar">
        <div>9:41</div>
        <div class="right mono">5G 100%</div>
      </div>
      <div class="topbar" style="justify-content:center; background:transparent; border-bottom:0; position:relative; z-index:2;">
        <div class="nav-title">Scan QR Code</div>
        <div style="position:absolute; left:20px; color:var(--text-2); font-size:14px;">Cancel</div>
      </div>
      <div class="camera-grid"></div>
      <div class="qr-window"></div>
      <div class="camera-callout">
        <div class="icon">⌾</div>
        <div>Point at the QR code from <span class="mono">jcode pair</span></div>
      </div>
    </div>
  </div>
</body>
</html>
