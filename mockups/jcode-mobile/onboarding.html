<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jcode mobile – Onboarding</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page">
  <div class="phone">
    <div class="canvas">
      <div class="statusbar">
        <div>9:41</div>
        <div class="right mono">5G 100%</div>
      </div>
      <div class="content centered-stack">
        <div class="prompt-mark">
          <div class="glyph"><span class="j">j</span><span class="gt">&gt;</span></div>
          <div class="cursor"></div>
        </div>

        <div class="hero-title">jcode</div>
        <div class="hero-copy">Your AI coding assistant,<br>right in your pocket.</div>

        <div class="btn-primary">Scan QR Code</div>
        <div class="help-copy">Run <span class="mono">jcode pair</span> on your computer<br>to generate a QR code.</div>

        <div class="eyebrow">Connect manually</div>
        <div class="card form-card">
          <div class="field">
            <div class="label">Host</div>
            <div class="input">my-macbook.tail1234.ts.net</div>
          </div>
          <div class="field">
            <div class="label">Port</div>
            <div class="input mono">7643</div>
          </div>
          <div class="field">
            <div class="label">Pair Code</div>
            <div class="input mono">842391</div>
          </div>
          <div class="field">
            <div class="label">Device Name</div>
            <div class="input">Jeremy’s iPhone</div>
          </div>
          <div class="btn-primary" style="margin-top: 8px;">Pair &amp; Connect</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
